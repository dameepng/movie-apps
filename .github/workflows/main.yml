name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd core && flutter pub get && cd ..
          cd about && flutter pub get && cd ..
          cd movie && flutter pub get && cd ..
          cd tv && flutter pub get && cd ..

      - name: Create stub Firebase options
        run: |
          echo "// ignore_for_file: unused_import" > lib/firebase_options.dart
          echo "import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;" >> lib/firebase_options.dart
          echo "class DefaultFirebaseOptions {" >> lib/firebase_options.dart
          echo "  static FirebaseOptions get currentPlatform {" >> lib/firebase_options.dart
          echo "    return const FirebaseOptions(apiKey: 'dummy', appId: 'dummy', messagingSenderId: 'dummy', projectId: 'dummy');" >> lib/firebase_options.dart
          echo "  }" >> lib/firebase_options.dart
          echo "}" >> lib/firebase_options.dart

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run tests
        run: |
          cd movie && flutter test
          cd ../tv && flutter test
